<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>



<!-- NAVBAR -->

<div class="navbar">

    Hostel Room Allotment System

</div>



<!-- DASHBOARD -->

<div class="dashboard-container">

    <div class="dashboard-grid">



        <!-- ALLOCATION -->

        <div class="dashboard-card">

            <h2>
                Room Allocation
            </h2>

            <p>
                Apply for hostel room allocation
            </p>

            <br>

            <a href="allocation.html">

                <button class="btn">

                    Allocate Room

                </button>

            </a>

        </div>



        <!-- VIEW ROOMS -->

        <div class="dashboard-card">

            <h2>
                View Rooms
            </h2>

            <p>
                Check available hostel rooms
            </p>

            <br>

            <a href="rooms.html">

                <button class="btn">

                    View Rooms

                </button>

            </a>

        </div>



        <!-- LOGOUT -->

        <div class="dashboard-card">

            <h2>
                Logout
            </h2>

            <p>
                Logout from the system
            </p>

            <br>

            <a href="login.html">

                <button class="btn">

                    Logout

                </button>

            </a>

        </div>



    </div>

</div>

</body>

</html>
