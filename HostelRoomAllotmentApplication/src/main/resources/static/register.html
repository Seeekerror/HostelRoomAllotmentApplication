<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Student Register</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>



<!-- NAVBAR -->

<div class="navbar">

    Hostel Room Allotment System

</div>



<!-- REGISTER FORM -->

<div class="container">

    <div class="card">

        <h1 class="title">
            Student Registration
        </h1>



        <form id="registerForm">



            <div class="input-group">

                <label>Name</label>

                <input type="text"
                       id="name"
                       placeholder="Enter Name"
                       required>

            </div>



            <div class="input-group">

                <label>Email</label>

                <input type="email"
                       id="email"
                       placeholder="Enter Email"
                       required>

            </div>



            <div class="input-group">

                <label>Password</label>

                <input type="password"
                       id="password"
                       placeholder="Enter Password"
                       required>

            </div>



            <div class="input-group">

                <label>Gender</label>

                <select id="gender">

                    <option value="MALE">
                        Male
                    </option>

                    <option value="FEMALE">
                        Female
                    </option>

                </select>

            </div>



            <div class="input-group">

                <label>Year</label>

                <select id="year">

                    <option value="1">
                        1st Year
                    </option>

                    <option value="2">
                        2nd Year
                    </option>

                    <option value="3">
                        3rd Year
                    </option>

                    <option value="4">
                        4th Year
                    </option>

                </select>

            </div>



            <div class="input-group">

                <label>Course</label>

                <select id="course">

                    <option value="BTECH">
                        BTECH
                    </option>

                    <option value="BCA">
                        BCA
                    </option>

                    <option value="MCA">
                        MCA
                    </option>

                    <option value="MBA">
                        MBA
                    </option>

                </select>

            </div>



            <button class="btn"
                    type="submit">

                Register

            </button>

        </form>

    </div>

</div>



<script src="app.js"></script>

</body>

</html>
