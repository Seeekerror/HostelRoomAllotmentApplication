<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Student Login</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>



<!-- NAVBAR -->

<div class="navbar">

    Hostel Room Allotment System

</div>



<!-- LOGIN FORM -->

<div class="container">

    <div class="card">

        <h1 class="title">
            Student Login
        </h1>



        <form id="loginForm">



            <div class="input-group">

                <label>Email</label>

                <input type="email"
                       id="loginEmail"
                       placeholder="Enter Email"
                       required>

            </div>



            <div class="input-group">

                <label>Password</label>

                <input type="password"
                       id="loginPassword"
                       placeholder="Enter Password"
                       required>

            </div>



            <button class="btn"
                    type="submit">

                Login

            </button>

        </form>

    </div>

</div>



<script src="app.js"></script>

</body>

</html>
